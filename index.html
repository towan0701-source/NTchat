<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeerJS ルームチャット（名前付き）</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f0f2f5; }
        #chat-box { width: 100%; max-width: 400px; height: 300px; border: 1px solid #ccc; background: white; overflow-y: scroll; padding: 10px; margin-bottom: 10px; border-radius: 5px; }
        .message { margin-bottom: 8px; padding: 6px 10px; border-radius: 10px; max-width: 70%; word-wrap: break-word; }
        .my-msg { background-color: #25d366; color: white; margin-left: auto; text-align: right; }
        .peer-msg { background-color: #e5e5ea; color: black; }
        .system-msg { color: #888; font-size: 0.9em; text-align: center; max-width: 100%; }
        .msg-sender { font-size: 0.75em; color: #666; margin-bottom: 2px; display: block; }
        .my-msg .msg-sender { color: #e0fde0; text-align: right; }
        .controls { display: flex; flex-direction: column; gap: 10px; max-width: 400px; }
        .row { display: flex; gap: 5px; }
        input, button { padding: 8px; font-size: 1em; border-radius: 4px; border: 1px solid #ccc; }
        input[type="text"] { flex-grow: 1; }
        button { background-color: #007bff; color: white; cursor: pointer; border: none; }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

    <h2>PeerJS ルームチャット</h2>
    <p>あなたの名前: <strong id="my-display-name"></strong></p>
    
    <div class="controls" id="room-selection">
        <p>同じルーム名を入力して「入室」を押してください。</p>
        <div class="row">
            <input type="text" id="room-input" placeholder="例: secret-room-123">
            <button id="join-btn">ルームに入室</button>
        </div>
    </div>

    <div id="chat-area" style="display: none; margin-top: 20px;">
        <p>ルーム: <strong id="current-room-name"></strong></p>
        <div id="chat-box">
            <div class="message system-msg">接続を待機中...</div>
        </div>

        <div class="controls">
            <div class="row">
                <input type="text" id="message-input" placeholder="メッセージを入力" disabled>
                <button id="send-btn" disabled>送信</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script>
        // --- 1. ページ読み込み時に名前を入力してもらう ---
        let myName = "";
        while (!myName) {
            myName = prompt("あなたのユーザー名を入力してください:", "ユーザー" + Math.floor(Math.random() * 1000));
            if (myName) myName = myName.trim();
        }
        document.getElementById('my-display-name').textContent = myName;

        let peer = null;
        let conn = null;
        let myRole = ''; 

        const roomInput = document.getElementById('room-input');
        const joinBtn = document.getElementById('join-btn');
        const roomSelection = document.getElementById('room-selection');
        const chatArea = document.getElementById('chat-area');
        const currentRoomName = document.getElementById('current-room-name');
        
        const chatBox = document.getElementById('chat-box');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');

        joinBtn.addEventListener('click', () => {
            const roomName = roomInput.value.trim();
            if (!roomName) return alert('ルーム名を入力してください');

            roomSelection.style.display = 'none';
            chatArea.style.display = 'block';
            currentRoomName.textContent = roomName;

            const hostId = `room-${roomName}-host`;
            const guestId = `room-${roomName}-guest`;

            peer = new Peer(guestId);

            peer.on('open', (id) => {
                myRole = 'guest';
                appendMessage('システム', 'ホストに接続しています...', 'system-msg');
                conn = peer.connect(hostId);
                setupConnection();
            });

            peer.on('error', (err) => {
                if (myRole === 'guest') {
                    peer.destroy(); 

                    myRole = 'host';
                    peer = new Peer(hostId); 

                    peer.on('open', () => {
                        appendMessage('システム', '最初の入室者です。相手を待っています...', 'system-msg');
                    });

                    peer.on('connection', (connection) => {
                        conn = connection;
                        setupConnection();
                        appendMessage('システム', '相手が入室しました！', 'system-msg');
                    });
                }
            });
        });

        // 接続確立後の処理
        function setupConnection() {
            conn.on('open', () => {
                appendMessage('システム', 'チャットが繋がりました！', 'system-msg');
                messageInput.disabled = false;
                sendBtn.disabled = false;
            });

            // --- 2. データを受信したときの処理 ---
            conn.on('data', (data) => {
                // 送られてきたデータ(JSON)を解析して、名前とメッセージを取り出す
                try {
                    const parsedData = JSON.parse(data);
                    appendMessage(parsedData.sender, parsedData.text, 'peer-msg');
                } catch (e) {
                    // 万が一普通のテキストが送られてきた場合のフォールバック
                    appendMessage('相手', data, 'peer-msg');
                }
            });

            conn.on('close', () => {
                appendMessage('システム', '相手が退室しました。', 'system-msg');
                messageInput.disabled = true;
                sendBtn.disabled = true;
            });
        }

        // --- 3. メッセージ送信処理 ---
        function sendMessage() {
            const msgText = messageInput.value.trim();
            if (!msgText || !conn) return;

            // 名前とメッセージをセットにした「オブジェクト」を作って送信する
            const payload = {
                sender: myName,
                text: msgText
            };

            // JSON形式（文字列）に変換してP2Pで送信
            conn.send(JSON.stringify(payload));

            // 自分の画面に表示
            appendMessage(myName, msgText, 'my-msg');
            messageInput.value = '';
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // メッセージ表示関数（名前表示を追加）
        function appendMessage(sender, text, className) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', className);

            // メッセージの上に送信者の名前を小さく表示する
            const senderSpan = document.createElement('span');
            senderSpan.classList.add('msg-sender');
            senderSpan.textContent = sender;

            const textSpan = document.createElement('span');
            textSpan.textContent = text;

            msgDiv.appendChild(senderSpan);
            msgDiv.appendChild(textSpan);
            
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
