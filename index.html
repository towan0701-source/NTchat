<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PeerJS LINE風チャット (ログ保存版)</title>
    <style>
        /* LINEダークモード風のデザイン */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        html, body { 
            height: 100dvh; 
            background-color: #111; 
            color: #fff; 
            overflow: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Segoe UI", sans-serif;
        }
        
        /* 共通ヘッダー */
        .header { background-color: #191919; padding: 15px; text-align: center; font-size: 1.1em; font-weight: bold; border-bottom: 1px solid #2d2d2d; position: sticky; top: 0; z-index: 10; }
        .sub-header { font-size: 0.8em; color: #888; font-weight: normal; margin-top: 4px; display: flex; justify-content: center; align-items: center; gap: 5px; }
        .edit-name-btn { background: none; border: none; color: #06C755; cursor: pointer; font-size: 1em; padding: 2px 5px; border-radius: 4px; }
        .edit-name-btn:hover { background-color: #2d2d2d; }

        /* メインコンテナ */
        .container { max-width: 500px; margin: 0 auto; background-color: #111; height: 100%; display: flex; flex-direction: column; position: relative; }

        /* === 1. 名前登録画面 === */
        #name-screen { padding: 30px 20px; display: flex; flex-direction: column; gap: 20px; justify-content: center; height: 100%; }
        .input-style { background-color: #222; border: 1px solid #333; color: white; padding: 12px; font-size: 1em; border-radius: 8px; width: 100%; outline: none; }
        .btn-style { background-color: #06C755; color: white; padding: 12px; font-size: 1em; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; }
        .btn-style:hover { background-color: #05A848; }

        /* === 2. トーク一覧画面 === */
        #list-screen { display: none; flex-direction: column; height: 100%; }
        .add-group-area { padding: 15px; border-bottom: 1px solid #2d2d2d; display: flex; gap: 8px; background-color: #191919; flex-shrink: 0; }
        
        /* トークリスト */
        .talk-list { list-style: none; overflow-y: auto; flex-grow: 1; -webkit-overflow-scrolling: touch; }
        .talk-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #2d2d2d; cursor: pointer; transition: background 0.2s; }
        .talk-item:hover { background-color: #1c1c1c; }
        .talk-icon { width: 45px; height: 45px; border-radius: 50%; background-color: #2b9c3f; display: flex; align-items: center; justify-content: center; font-size: 1.2em; margin-right: 15px; font-weight: bold; flex-shrink: 0; }
        .talk-info { flex-grow: 1; min-width: 0; }
        .talk-name { font-weight: bold; font-size: 1em; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .talk-desc { font-size: 0.8em; color: #888; }
        
        /* 操作ボタン用のエリア */
        .talk-actions { display: flex; gap: 10px; margin-left: 10px; }
        .action-btn { background: none; border: none; font-size: 1.1em; cursor: pointer; padding: 5px; border-radius: 4px; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
        .action-btn:hover { background-color: #333; }
        .edit-btn { color: #3498db; }
        .delete-btn { color: #e74c3c; }

        /* === 3. チャット画面 === */
        #chat-screen { 
            display: none; 
            flex-direction: column; 
            position: absolute; 
            top: 0; 
            left: 0; 
            right: 0; 
            bottom: 0; 
            z-index: 20; 
            background-color: #111; 
            width: 100%;
        }
        .chat-header { display: flex; align-items: center; justify-content: space-between; background-color: #191919; padding: 12px 15px; border-bottom: 1px solid #2d2d2d; flex-shrink: 0; }
        .back-btn { background: none; border: none; color: #06C755; font-size: 1.5em; cursor: pointer; }
        
        #chat-box { 
            flex-grow: 1; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            background-color: #151e24; 
            -webkit-overflow-scrolling: touch; 
        }
        .message { max-width: 75%; display: flex; flex-direction: column; word-wrap: break-word; }
        .my-msg { align-self: flex-end; }
        .peer-msg { align-self: flex-start; }
        
        .msg-sender { font-size: 0.75em; color: #888; margin-bottom: 3px; }
        .my-msg .msg-sender { display: none; }
        
        .msg-bubble { padding: 10px 14px; border-radius: 18px; font-size: 0.95em; line-height: 1.4; color: #fff; }
        .my-msg .msg-bubble { background-color: #06C755; border-bottom-right-radius: 2px; }
        .peer-msg .msg-bubble { background-color: #2c2c2e; border-bottom-left-radius: 2px; }
        
        .system-msg { align-self: center; background-color: rgba(255, 255, 255, 0.1); font-size: 0.8em; color: #ccc; padding: 4px 10px; border-radius: 12px; max-width: 90%; text-align: center; }

        /* 送信フォーム */
        .chat-input-area { background-color: #191919; padding: 10px 15px; display: flex; gap: 8px; border-top: 1px solid #2d2d2d; flex-shrink: 0; }
        .chat-input { flex-grow: 1; }
        .send-btn { background-color: #06C755; }
        .send-btn:disabled { background-color: #2d2d2d; color: #555; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <div id="name-screen">
        <h2 style="text-align: center; margin-bottom: 10px;">LINE風チャットへようこそ</h2>
        <p style="color: #888; text-align: center; font-size: 0.9em;">チャットで使用する名前を入力してください。</p>
        <input type="text" id="username-input" class="input-style" placeholder="ユーザー名を入力">
        <button id="save-name-btn" class="btn-style">登録する</button>
    </div>

    <div id="list-screen">
        <div class="header">
            トーク
            <div class="sub-header">
                ユーザー: <span id="display-my-name"></span>
                <button id="change-name-btn" class="edit-name-btn" title="名前を変更">✏️</button>
            </div>
        </div>
        <div class="add-group-area">
            <input type="text" id="new-group-input" class="input-style" placeholder="新しいグループ名/ルーム名">
            <button id="add-group-btn" class="btn-style" style="white-space: nowrap; padding: 0 15px;">作成</button>
        </div>
        <ul class="talk-list" id="talk-list-container">
            </ul>
    </div>

    <div id="chat-screen">
        <div class="chat-header">
            <button class="back-btn" id="back-to-list">＜</button>
            <div style="font-weight: bold; font-size: 1.1em;" id="chat-title">グループチャット</div>
            <div style="width: 24px;"></div>
        </div>

        <div id="chat-box">
            </div>

        <div class="chat-input-area">
            <input type="text" id="message-input" class="input-style chat-input" placeholder="メッセージを入力...">
            <button id="send-btn" class="btn-style send-btn">送信</button>
        </div>
    </div>
</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
    // --- グローバル変数 & データ構造 ---
    let myName = localStorage.getItem('chat_username') || ''; 
    let groups = JSON.parse(localStorage.getItem('chat_groups')) || []; 
    
    // 【新規】チャット履歴をグループごとに保持するオブジェクト
    let chatLogs = JSON.parse(localStorage.getItem('chat_logs')) || {};

    let peer = null;
    let conn = null;
    let myRole = ''; 
    let currentActiveRoom = '';
    let messageQueue = [];

    // DOM要素の取得
    const nameScreen = document.getElementById('name-screen');
    const listScreen = document.getElementById('list-screen');
    const chatScreen = document.getElementById('chat-screen');
    
    const usernameInput = document.getElementById('username-input');
    const saveNameBtn = document.getElementById('save-name-btn');
    const displayMyName = document.getElementById('display-my-name');
    const changeNameBtn = document.getElementById('change-name-btn');
    
    const newGroupInput = document.getElementById('new-group-input');
    const addGroupBtn = document.getElementById('add-group-btn');
    const talkListContainer = document.getElementById('talk-list-container');
    
    const chatTitle = document.getElementById('chat-title');
    const backToListBtn = document.getElementById('back-to-list');
    const chatBox = document.getElementById('chat-box');
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');

    // --- 1. 初期表示の判定 ---
    window.addEventListener('load', () => {
        if (myName) {
            showListScreen();
        } else {
            nameScreen.style.display = 'flex';
            listScreen.style.display = 'none';
        }
        adjustHeightForMobile();
    });

    window.visualViewport.addEventListener('resize', adjustHeightForMobile);
    window.visualViewport.addEventListener('scroll', adjustHeightForMobile);

    function adjustHeightForMobile() {
        const height = window.visualViewport.height;
        document.body.style.height = `${height}px`;
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // 名前の保存（初回）
    saveNameBtn.addEventListener('click', () => {
        const inputVal = usernameInput.value.trim();
        if (!inputVal) return alert('名前を入力してください');
        
        saveName(inputVal);
        showListScreen();
    });

    // ユーザー名変更
    changeNameBtn.addEventListener('click', () => {
        const newName = prompt('新しいユーザー名を入力してください:', myName);
        if (newName === null) return; 
        
        const trimmedName = newName.trim();
        if (!trimmedName) return alert('名前を入力してください');
        
        saveName(trimmedName);
        displayMyName.textContent = myName;
    });

    function saveName(name) {
        myName = name;
        localStorage.setItem('chat_username', myName);
    }

    function showListScreen() {
        nameScreen.style.display = 'none';
        listScreen.style.display = 'flex';
        displayMyName.textContent = myName;
        renderGroups();
    }

    // --- 2. グループ（トーク）の追加と表示 ---
    addGroupBtn.addEventListener('click', () => {
        const groupName = newGroupInput.value.trim();
        if (!groupName) return alert('グループ名を入力してください');

        if (groups.includes(groupName)) {
            alert('そのグループはすでに作成されています');
            return;
        }

        groups.push(groupName);
        saveGroupsToLocalStorage();
        newGroupInput.value = '';
        renderGroups();
    });

    function saveGroupsToLocalStorage() {
        localStorage.setItem('chat_groups', JSON.stringify(groups));
    }

    // グループリストの描画
    function renderGroups() {
        talkListContainer.innerHTML = '';
        
        if (groups.length === 0) {
            talkListContainer.innerHTML = `<li style="padding: 20px; text-align: center; color: #555; font-size: 0.9em;">作成されたグループはありません</li>`;
            return;
        }

        groups.forEach((groupName, index) => {
            const li = document.createElement('li');
            li.classList.add('talk-item');
            
            const firstChar = groupName.charAt(0).toUpperCase();

            li.innerHTML = `
                <div class="talk-icon">${firstChar}</div>
                <div class="talk-info" id="info-${index}">
                    <div class="talk-name">${groupName}</div>
                    <div class="talk-desc">タップしてトークに入室</div>
                </div>
                <div class="talk-actions">
                    <button class="action-btn edit-btn" title="名前を変更" id="edit-${index}">✏️</button>
                    <button class="action-btn delete-btn" title="削除" id="delete-${index}">🗑️</button>
                </div>
            `;

            li.querySelector(`#info-${index}`).addEventListener('click', () => {
                enterChatRoom(groupName);
            });

            // グループ名変更
            li.querySelector(`#edit-${index}`).addEventListener('click', (e) => {
                e.stopPropagation();
                const newName = prompt(`「${groupName}」の新しいグループ名を入力してください:`, groupName);
                if (newName === null) return;
                const trimmedName = newName.trim();
                if (!trimmedName) return alert('グループ名が空です');
                if (trimmedName === groupName) return;
                if (groups.includes(trimmedName)) return alert('すでに同じ名前のグループが存在します');

                // ログデータのキー名も書き換える
                if (chatLogs[groupName]) {
                    chatLogs[trimmedName] = chatLogs[groupName];
                    delete chatLogs[groupName];
                    localStorage.setItem('chat_logs', JSON.stringify(chatLogs));
                }

                groups[index] = trimmedName;
                saveGroupsToLocalStorage();
                renderGroups();
            });

            // グループ削除
            li.querySelector(`#delete-${index}`).addEventListener('click', (e) => {
                e.stopPropagation();
                if (confirm(`本当に「${groupName}」グループを削除しますか？\n(このグループのチャット履歴も完全に削除されます)`)) {
                    // このグループのログも削除
                    delete chatLogs[groupName];
                    localStorage.setItem('chat_logs', JSON.stringify(chatLogs));

                    groups.splice(index, 1);
                    saveGroupsToLocalStorage();
                    renderGroups();
                }
            });

            talkListContainer.appendChild(li);
        });
    }

    // --- 3. チャットルーム入室とWebRTC接続 ---
    function enterChatRoom(roomName) {
        currentActiveRoom = roomName;
        listScreen.style.display = 'none';
        chatScreen.style.display = 'flex';
        chatTitle.textContent = roomName;
        
        messageQueue = [];
        chatBox.innerHTML = ''; // 一旦クリア

        // 【新規】このグループの過去ログが存在すれば、まず画面に復元（描画）する
        if (chatLogs[roomName]) {
            chatLogs[roomName].forEach(log => {
                // 保存されている履歴を表示
                appendMessageToUI(log.sender, log.text, log.className);
            });
            appendMessageToUI('システム', '--- 過去のメッセージ ---', 'system-msg');
        }

        appendMessageToUI('システム', '接続を開始中...', 'system-msg');

        const hostId = `room-${roomName}-host`;
        const guestId = `room-${roomName}-guest`;

        peer = new Peer(guestId);

        peer.on('open', (id) => {
            myRole = 'guest';
            appendMessageToUI('システム', 'ホストを検索中...', 'system-msg');
            conn = peer.connect(hostId);
            setupConnection();
        });

        peer.on('error', (err) => {
            if (myRole === 'guest') {
                peer.destroy(); 

                myRole = 'host';
                peer = new Peer(hostId);

                peer.on('open', () => {
                    appendMessageToUI('システム', '最初の入室者です。友達の接続を待っています...', 'system-msg');
                });

                peer.on('connection', (connection) => {
                    conn = connection;
                    setupConnection();
                    appendMessageToUI('システム', '相手が入室しました！', 'system-msg');
                });
            }
        });
    }

    // 接続確立後のセットアップ
    function setupConnection() {
        conn.on('open', () => {
            appendMessageToUI('システム', 'チャットが繋がりました！', 'system-msg');
            
            if (messageQueue.length > 0) {
                appendMessageToUI('システム', `未送信メッセージを ${messageQueue.length} 件送信中...`, 'system-msg');
                messageQueue.forEach(payload => {
                    conn.send(JSON.stringify(payload));
                });
                messageQueue = []; 
            }
            
            setTimeout(adjustHeightForMobile, 100);
        });

        conn.on('data', (data) => {
            try {
                const parsedData = JSON.parse(data);
                // 【新規】受信メッセージを画面追加 ＆ ログ保存
                appendMessageAndSave(parsedData.sender, parsedData.text, 'peer-msg');
            } catch (e) {
                appendMessageAndSave('相手', data, 'peer-msg');
            }
        });

        conn.on('close', () => {
            appendMessageToUI('システム', '相手が退室しました。再接続を待っています...', 'system-msg');
        });
    }

    // メッセージ送信処理
    function sendMessage() {
        const msgText = messageInput.value.trim();
        if (!msgText) return;

        const payload = {
            sender: myName,
            text: msgText
        };

        if (conn && conn.open) {
            conn.send(JSON.stringify(payload));
        } else {
            messageQueue.push(payload);
        }

        // 【新規】自分のメッセージを画面追加 ＆ ログ保存
        appendMessageAndSave(myName, msgText, 'my-msg');
        messageInput.value = '';
    }

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    backToListBtn.addEventListener('click', () => {
        if (conn) conn.close();
        if (peer) peer.destroy();
        
        conn = null;
        peer = null;
        currentActiveRoom = '';
        messageQueue = []; 

        chatScreen.style.display = 'none';
        listScreen.style.display = 'flex';
        adjustHeightForMobile();
    });

    // 【新規】メッセージを表示し、かつローカルに保存する関数
    function appendMessageAndSave(sender, text, className) {
        // 1. 画面に追加
        appendMessageToUI(sender, text, className);

        // 2. ログに保存（システムメッセージは保存から除外）
        if (className !== 'system-msg') {
            if (!chatLogs[currentActiveRoom]) {
                chatLogs[currentActiveRoom] = [];
            }
            chatLogs[currentActiveRoom].push({ sender, text, className });
            localStorage.setItem('chat_logs', JSON.stringify(chatLogs));
        }
    }

    // メッセージを画面上のUIに組み立てて描画するだけの関数
    function appendMessageToUI(sender, text, className) {
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('message', className);

        const senderSpan = document.createElement('span');
        senderSpan.classList.add('msg-sender');
        senderSpan.textContent = sender;

        const bubbleDiv = document.createElement('div');
        bubbleDiv.classList.add('msg-bubble');
        bubbleDiv.textContent = text;

        if (className !== 'system-msg') {
            msgDiv.appendChild(senderSpan);
        }
        msgDiv.appendChild(bubbleDiv);
        
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>
</body>
</html>
