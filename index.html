<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeerJS 1対1チャット</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f0f2f5; }
        #chat-box { width: 100%; max-width: 400px; height: 300px; border: 1px solid #ccc; background: white; overflow-y: scroll; padding: 10px; margin-bottom: 10px; border-radius: 5px; }
        .message { margin-bottom: 8px; padding: 6px 10px; border-radius: 10px; max-width: 70%; word-wrap: break-word; }
        .my-msg { background-color: #25d366; color: white; margin-left: auto; text-align: right; }
        .peer-msg { background-color: #e5e5ea; color: black; }
        .system-msg { color: #888; font-size: 0.9em; text-align: center; max-width: 100%; }
        .controls { display: flex; flex-direction: column; gap: 10px; max-width: 400px; }
        .row { display: flex; gap: 5px; }
        input, button { padding: 8px; font-size: 1em; border-radius: 4px; border: 1px solid #ccc; }
        input[type="text"] { flex-grow: 1; }
        button { background-color: #007bff; color: white; cursor: pointer; border: none; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <h2>PeerJS チャット</h2>
    
    <div class="controls">
        <div>
            <strong>あなたのID:</strong> <span id="my-id">読み込み中...</span>
        </div>
        <div class="row">
            <input type="text" id="peer-id-input" placeholder="相手のIDを入力">
            <button id="connect-btn">接続</button>
        </div>
    </div>

    <br>

    <div id="chat-box">
        <div class="message system-msg">IDを共有して接続してください。</div>
    </div>

    <div class="controls">
        <div class="row">
            <input type="text" id="message-input" placeholder="メッセージを入力" disabled>
            <button id="send-btn" disabled>送信</button>
        </div>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script>
        // Peerオブジェクトの作成（PeerJSが提供する無料のシグナリングサーバーを利用）
        const peer = new Peer();
        let conn = null;

        const myIdSpan = document.getElementById('my-id');
        const peerIdInput = document.getElementById('peer-id-input');
        const connectBtn = document.getElementById('connect-btn');
        const chatBox = document.getElementById('chat-box');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');

        // 自分のIDが発行されたとき
        peer.on('open', (id) => {
            myIdSpan.textContent = id;
        });

        // 相手から接続されたとき（受信側）
        peer.on('connection', (connection) => {
            conn = connection;
            setupConnection();
            appendMessage('システム', '相手が接続しました！', 'system-msg');
        });

        // 接続ボタンを押したとき（発信側）
        connectBtn.addEventListener('click', () => {
            const peerId = peerIdInput.value.trim();
            if (!peerId) return alert('相手のIDを入力してください');

            conn = peer.connect(peerId);
            setupConnection();
            appendMessage('システム', '接続を試みています...', 'system-msg');
        });

        // 接続が確立した後のデータ送受信ルール
        function setupConnection() {
            conn.on('open', () => {
                appendMessage('システム', 'チャットが利用可能です。', 'system-msg');
                messageInput.disabled = false;
                sendBtn.disabled = false;
            });

            // メッセージを受信したとき
            conn.on('data', (data) => {
                appendMessage('相手', data, 'peer-msg');
            });

            conn.on('close', () => {
                appendMessage('システム', '接続が切断されました。', 'system-msg');
                messageInput.disabled = true;
                sendBtn.disabled = true;
            });
        }

        // メッセージ送信処理
        function sendMessage() {
            const msg = messageInput.value.trim();
            if (!msg || !conn) return;

            conn.send(msg); // 相手に送信
            appendMessage('自分', msg, 'my-msg'); // 自分の画面に表示
            messageInput.value = '';
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // 画面にメッセージを追加する関数
        function appendMessage(sender, text, className) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', className);
            msgDiv.textContent = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight; // 一番下までスクロール
        }
    </script>
</body>
</html>
